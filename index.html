<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            
            <div class="team">
                <h3>HOME</h3>
                 <div id="homescore-el" class="scorecard">0</div>
                 
                 <div class=points>
                    <button id="add-1" class="adder" onclick="add1Home()">+1</button>
                    <button id="add-2" class="adder" onclick="add2Home()">+2</button>
                    <button id="add-3" class="adder" onclick="add3Home()">+3</button>
                 </div>
            
            </div>
            
            <div class="team">
                <h3>GUEST</h3>
                <div id="guestscore-el" class="scorecard">0</div>
                
                <div class=points>
                    <button id="add-1" class="adder" onclick="add1Guest()">+1</button>
                    <button id="add-2" class="adder" onclick="add2Guest()">+2</button>
                    <button id="add-3" class="adder" onclick="add3Guest()">+3</button>
                 </div>
                 
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
